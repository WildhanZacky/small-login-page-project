<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Welcome Back</h1>
            <p>Your Personal Dashboard</p>
        </header>

        <div class="widget-grid">
            <div class="widget-card" onclick="navigateTo('https://www.youtube.com/')">
                <div class="icon">🎥</div>
                <h3>Youtube</h3>
                <p>Watch latest videos</p>
            </div>

            <div class="widget-card" onclick="navigateTo('https://instagram.com')">
                <div class="icon">📸</div>
                <h3>Instagram</h3>
                <p>Check your feed</p>
            </div>

            <div class="widget-card" onclick="navigateTo('https://github.com')">
                <div class="icon">💻</div>
                <h3>Github</h3>
                <p>View your projects</p>
            </div>
        </div>
    </div>

    <script src="script2.js"></script>
</body>
</html>
