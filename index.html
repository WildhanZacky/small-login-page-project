<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Welcome Back</h1>
            <p>Your Personal Dashboard</p>
        </header>

        <div class="welcome-section">
            <h1 id="greeting">Loading...</h1>
            <div class="clock-container">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
            </div>
            <p id="date-display"></p>
            <div id="weatherDisplay" style="font-size: 1.2rem; color: var(--theme-color); font-weight: 600; margin-top: 5px;">
                Loading weather...
            </div>
        </div>

        <div class="widget-card gallery-widget">
            <div class="gallery-preview" id="galleryPreview"></div>
        </div>

        <div class="widget-grid">
            <div class="widget-card" onclick="navigateTo('https://www.youtube.com/')">
                <div class="icon">🎥</div>
                <h3>Youtube</h3>
                <p>Watch latest videos</p>
            </div>

            <div class="widget-card" onclick="navigateTo('https://instagram.com')">
                <div class="icon">📸</div>
                <h3>Instagram</h3>
                <p>Check your feed</p>
            </div>

            <div class="widget-card" onclick="navigateTo('https://github.com')">
                <div class="icon">💻</div>
                <h3>Github</h3>
                <p>View your projects</p>
            </div>
        </div>

        <div class="todo-widget">
            <h3>Task Notes</h3>
            <div class="todo-input-group">
                <input type="text" id="todoInput" placeholder="Add a new task...">
                <button id="addBtn">Add</button>
            </div>
            <ul id="todoList">
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
