<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <header>
            <h1>Welcome Back</h1>
            <p>Your Personal Dashboard</p>
        </header>

        <div class="welcome-section">
            <div class="search-container">
                <form action="https://www.google.com/search" method="get">
                    <input type="text" name="q" placeholder="Search Google..." class="search-input">
                </form>
            </div>
            <h1 id="greeting">Loading...</h1>
            <div class="clock-container">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>
            </div>
            <p id="date-display"></p>
            <div id="weatherDisplay" style="font-size: 1.2rem; color: var(--theme-color); font-weight: 600; margin-top: 5px;">
                Loading weather...
            </div>
        </div>

        <div class="widget-card gallery-widget">
            <div class="gallery-preview" id="galleryPreview"></div>
        </div>

        <div class="widget-grid">
            <div class="widget-card" onclick="navigateTo('https://www.youtube.com/')">
                <div class="icon">🎥</div>
                <h3>Youtube</h3>
                <p>Watch latest videos</p>
            </div>

            <div class="widget-card" onclick="navigateTo('https://instagram.com')">
                <div class="icon">📸</div>
                <h3>Instagram</h3>
                <p>Check your feed</p>
            </div>

            <div class="widget-card" onclick="navigateTo('https://github.com')">
                <div class="icon">💻</div>
                <h3>Github</h3>
                <p>View your projects</p>
            </div>
        </div>

        <div class="music-card">
            <div class="music-info">
                <img src="img/ゞ🌺_Ai_Mie.jpg" alt="Album Art" class="album-art">
                <div class="track-details">
                    <h4 class="track-tittle">This Playlist</h4>
                    <p class="track-artist">AI_M1E & Fr3yja_Wi0n</p>
                </div>
            </div>

            <div class="music-controls">
                <div class="progress-bar"><div class="progress"></div></div>
                <div class="platform-links">
                    <a href="https://open.spotify.com/playlist/41ipRWYTDr0CW1Avh4yhOd?si=2X8JO9xjQSa_B0KiXexzhQ" target="_blank" class="music-link">
                        <i class="fab fa-spotify"></i> Spotify
                    </a>
                    <a href="https://music.apple.com/id/playlist/this-playlist/pl.u-qxylEY6s3WkEr99" target="_blank" class="music-link">
                        <i class="fab fa-apple"></i> Apple Music
                    </a>
                </div>
            </div>
        </div>

        <div class="todo-widget">
            <h3>Task Notes</h3>
            <div class="todo-input-group">
                <input type="text" id="todoInput" placeholder="Add a new task...">
                <button id="addBtn">Add</button>
            </div>
            <ul id="todoList">
            </ul>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
